# OCTOPUS OS — production docker-compose
#
# Brings up the api-server and a real Postgres instance together. Secrets
# (DATABASE_URL's password, JWT_SECRET, ANTHROPIC_API_KEY or equivalent
# provider keys referenced by provider_configs rows) are read from a local
# `.env` file via `env_file` below — that file is never committed (see
# `.gitignore`) and must be created per-deployment. See
# FINAL_SECURITY_REPORT.md for the full secrets-management posture.
#
# First run only: apply the schema with
#   docker compose -f docker-compose.prod.yml run --rm api-server \
#     pnpm --filter @workspace/db run push
# (requires DATABASE_URL to point at the `db` service below, e.g.
#   postgres://octopus:${POSTGRES_PASSWORD}@db:5432/octopus)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: octopus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: octopus
    volumes:
      - octopus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octopus -d octopus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - octopus_internal

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://octopus:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/octopus
    ports:
      - "${API_PORT:-5000}:5000"
    networks:
      - octopus_internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  octopus_postgres_data:

networks:
  octopus_internal:
    driver: bridge
